<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elhoim Esaim | Mola Mola Wonogiri</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,700;1,400&display=swap');
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: #0f0f0f;
      color: #e8e8e8;
      font-family: 'Crimson Text', serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background-image: 
        radial-gradient(circle at 20% 80%, #1a2e1a 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, #1a1a2e 0%, transparent 50%);
    }
    
    .container {
      max-width: 500px;
      text-align: center;
      background: rgba(20, 20, 20, 0.7);
      padding: 40px 30px;
      border-radius: 20px;
      border: 1px solid #2a2a2a;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
    }
    
    .apel {
      width: 200px;
      height: 200px;
      object-fit: cover;
      border-radius: 50%;
      margin: 0 auto 25px;
      border: 3px solid #2a4a2a;
      box-shadow: 0 0 30px rgba(144, 238, 144, 0.2);
    }
    
    h1 {
      color: #90EE90;
      font-size: 28px;
      margin-bottom: 8px;
      font-weight: 700;
      letter-spacing: 1px;
    }
    
    .timestamp {
      color: #888;
      font-size: 14px;
      margin-bottom: 30px;
      font-style: italic;
    }
    
    .quote {
      font-size: 20px;
      line-height: 1.8;
      margin: 25px 0;
      color: #f0f0f0;
    }
    
    .lirik {
      font-style: italic;
      color: #b8b8b8;
      margin: 30px 0;
      padding: 20px;
      border-left: 2px solid #90EE90;
      border-right: 2px solid #90EE90;
    }
    
    .doa {
      margin-top: 35px;
      font-size: 18px;
      color: #90EE90;
      letter-spacing: 2px;
    }
    
    .love {
      margin-top: 30px;
      font-size: 40px;
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.8; }
    }
    
    .footer {
      margin-top: 40px;
      font-size: 12px;
      color: #666;
      border-top: 1px solid #2a2a2a;
      padding-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- GANTI LINK FOTO DI BAWAH INI -->
    <img src="https://i.imgur.com/8Q1ZQ3a.jpeg" alt="Apel di rumput Wonogiri" class="apel">
    
    <h1>Sampai Jadi Debu</h1>
    <div class="timestamp">Wonogiri, 22:33</div>
    
    <div class="quote">
      "Udah aku cobain dulu.<br>Aman."
    </div>
    
    <div class="lirik">
      Sampai kita tua<br>
      Sampai jadi debu<br>
      Ku di liang yang satu<br>
      Ku disebelahmu
    </div>
    
    <div class="doa">ELHOIM ESAIM</div>
    
    <div class="love">💚</div>
    
    <div class="footer">
      23:37 — untuk yang mau istirahat sebelahan<br>
      Mola Mola Wonogiri © 2026
    </div>
  </div>
</body>
</html>
